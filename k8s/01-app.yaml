---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labkit-share
  namespace: labkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: labkit-share
  template:
    metadata:
      labels:
        app: labkit-share
    spec:
      containers:
        - name: labkit-share
          image: labkit-share:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: labkit-share
  namespace: labkit
spec:
  selector:
    app: labkit-share
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: labkit-share-db
  namespace: labkit
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labkit-share-api
  namespace: labkit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: labkit-share-api
  template:
    metadata:
      labels:
        app: labkit-share-api
    spec:
      containers:
        - name: labkit-share-api
          image: labkit-share-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: DB_PATH
              value: "/data/share.db"
          volumeMounts:
            - name: db-storage
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "192Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: labkit-share-db
---
apiVersion: v1
kind: Service
metadata:
  name: labkit-share-api
  namespace: labkit
spec:
  selector:
    app: labkit-share-api
  ports:
    - port: 80
      targetPort: 5000
